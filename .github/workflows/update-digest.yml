name: Update Leaderboard

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Batch index (0-23), leave empty to auto-detect from current hour"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pakdev-pipeline
  cancel-in-progress: false

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Asia/Karachi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine batch index
        id: batch
        run: |
          INPUT_BATCH="${{ github.event.inputs.batch }}"
          if [ -n "$INPUT_BATCH" ]; then
            echo "index=$INPUT_BATCH" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%-H)
            INDEX=$(( (HOUR + 5) % 24 ))
            echo "index=$INDEX" >> "$GITHUB_OUTPUT"
          fi
          echo "Batch index: $(grep index "$GITHUB_OUTPUT" | tail -1)"

      - name: Run incremental pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BATCH="${{ steps.batch.outputs.index }}"
          echo "Running incremental batch: $BATCH"
          node scripts/run-all.js --incremental "$BATCH"

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- public/data.json; then
            echo "No leaderboard changes to commit."
            exit 0
          fi

          git add public/data.json
          git commit -m "chore: update leaderboard (batch ${{ steps.batch.outputs.index }})"

          if git push origin HEAD:main; then
            exit 0
          fi

          echo "Push rejected because main moved. Rebasing onto latest origin/main and retrying."
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          VITE_SUMMARY_API_URL: ${{ vars.VITE_SUMMARY_API_URL || 'https://rankistan-summary-api.academics-ali.workers.dev' }}
          VITE_LEADERBOARD_API_URL: ${{ vars.VITE_LEADERBOARD_API_URL || '' }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
